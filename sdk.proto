syntax = "proto3";

package execd.sdk;

// =============================================================================
// SDK Service - Client-facing gRPC service over TCP
// =============================================================================
// This service is exposed to strategy clients (Python/TypeScript SDK).
// It runs on TCP (not UDS) so remote clients can connect.
// The execd daemon acts as a bridge between SDK clients and hybrid workers.

service SdkService {
  // Register a strategy and create a worker for it
  // This spawns a Node.js worker process and connects to the exchange
  // Automatically subscribes to private channels (user fills, trades)
  rpc Register(SdkRegisterRequest) returns (SdkRegisterResponse);
  
  // Subscribe to market data for multiple symbols (optional, for maker orders)
  // Must be called after Register to set up price feeds (orderbook, ticker)
  // Private streams are already connected during Register
  rpc SubscribeMarketData(SdkSubscribeRequest) returns (SdkSubscribeResponse);
  
  // Execute batch DCA maker orders on multiple symbols concurrently
  // The server splits this into parallel requests to the worker
  rpc ExecuteBatchDcaMaker(SdkBatchDcaMakerRequest) returns (SdkBatchDcaMakerResponse);
  
  // Execute a single DCA taker order (for Hyperliquid HIP-3 and standard perps)
  rpc ExecuteDcaTaker(SdkDcaTakerRequest) returns (SdkDcaTakerResponse);
  
  // Execute maker-taker cross-exchange arbitrage
  // Places maker orders on one exchange and immediately hedges with taker orders on another
  // when the spread threshold is met. Used for funding rate arbitrage + spread capture.
  rpc ExecuteMakerTaker(SdkMakerTakerRequest) returns (SdkMakerTakerResponse);
  
  // Execute taker-taker cross-exchange arbitrage
  // Places market orders on both exchanges simultaneously when spread threshold is met.
  // Simpler and faster than maker-taker, but pays taker fees on both sides.
  rpc ExecuteTakerTaker(SdkTakerTakerRequest) returns (SdkTakerTakerResponse);
  
  // =============================================================================
  // Snapshot Query RPCs - Query current state from worker WebSocket streams
  // =============================================================================
  
  // Get current positions for a worker
  rpc GetPositions(SdkGetPositionsRequest) returns (SdkGetPositionsResponse);
  
  // Get current portfolio (account balances, equity, margin info)
  rpc GetPortfolio(SdkGetPortfolioRequest) returns (SdkGetPortfolioResponse);
  
  // Get current prices for subscribed symbols
  rpc GetPrices(SdkGetPricesRequest) returns (SdkGetPricesResponse);
  
  // Health check for the connection
  rpc HealthCheck(SdkHealthCheckRequest) returns (SdkHealthCheckResponse);
  
  // Shutdown a worker
  rpc Shutdown(SdkShutdownRequest) returns (SdkShutdownResponse);
  
  // =============================================================================
  // Operation RPCs - non-execution operations (margin management, etc.)
  // =============================================================================
  
  // Transfer margin from cross-margin balance into a symbol's isolated margin (Hyperliquid)
  rpc UpdateIsolatedMargin(SdkUpdateIsolatedMarginRequest) returns (SdkUpdateIsolatedMarginResponse);
}

// =============================================================================
// Common Types
// =============================================================================

// Request metadata
message SdkRequestMetadata {
  string request_id = 1;          // Unique ID for request correlation
  int64 timestamp_ns = 2;         // Nanosecond timestamp when request was created
}

// Response metadata
message SdkResponseMetadata {
  string request_id = 1;          // Echoed from request
  int64 timestamp_ns = 2;         // Timestamp when response was created
  int64 processing_time_ms = 3;   // Time spent processing (milliseconds)
}

// Exchange types supported
enum SdkExchange {
  SDK_EXCHANGE_UNSPECIFIED = 0;
  SDK_EXCHANGE_BINANCE = 1;
  SDK_EXCHANGE_BYBIT = 2;
  SDK_EXCHANGE_HYPERLIQUID = 3;
  SDK_EXCHANGE_BACKPACK = 4;
  SDK_EXCHANGE_ASTER = 5;
  SDK_EXCHANGE_LIGHTER = 6;
  SDK_EXCHANGE_DRIFT = 7;
  SDK_EXCHANGE_FUTU = 8;
}

// Instrument types
enum SdkInstrumentType {
  SDK_INSTRUMENT_TYPE_UNSPECIFIED = 0;
  SDK_INSTRUMENT_TYPE_SPOT = 1;
  SDK_INSTRUMENT_TYPE_PERP = 2;
  SDK_INSTRUMENT_TYPE_FUTURE = 3;
}

// Order side
enum SdkSide {
  SDK_SIDE_UNSPECIFIED = 0;
  SDK_SIDE_BUY = 1;
  SDK_SIDE_SELL = 2;
}

// Price method for maker orders
enum SdkMakerPriceMethod {
  SDK_MAKER_PRICE_METHOD_UNSPECIFIED = 0;
  SDK_MAKER_PRICE_METHOD_BEST_BID = 1;
  SDK_MAKER_PRICE_METHOD_BEST_ASK = 2;
  SDK_MAKER_PRICE_METHOD_BEST_BID_EXCLUDE_SELF = 3;
  SDK_MAKER_PRICE_METHOD_BEST_ASK_EXCLUDE_SELF = 4;
  SDK_MAKER_PRICE_METHOD_MID_PRICE = 7;
}

// Action status
enum SdkActionStatus {
  SDK_ACTION_STATUS_UNSPECIFIED = 0;
  SDK_ACTION_STATUS_PENDING = 1;
  SDK_ACTION_STATUS_RUNNING = 2;
  SDK_ACTION_STATUS_COMPLETED = 3;
  SDK_ACTION_STATUS_FAILED = 4;
  SDK_ACTION_STATUS_CANCELLED = 5;
  SDK_ACTION_STATUS_SKIPPED = 6;              // Below minimum size threshold
  SDK_ACTION_STATUS_PARTIALLY_COMPLETE = 7;   // Action partially completed
}

// =============================================================================
// Register Messages
// =============================================================================

// An exchange + account_id pair. The account_id references a row in the
// `public.account` table and maps to an AWS Secrets Manager secret named
// `execd_{account_id}` which holds the actual API credentials.
message ExchangeAccount {
  SdkExchange exchange = 1;       // Exchange enum (BINANCE, HYPERLIQUID, etc.)
  int32 account_id = 2;           // Account ID — resolves to secret `execd_{account_id}`
}

message SdkRegisterRequest {
  SdkRequestMetadata metadata = 1;
  
  // Strategy configuration
  string strategy_name = 2;
  
  // Primary exchange account — credentials resolved server-side from AWS Secrets Manager
  ExchangeAccount account = 11;
  
  // Optional second exchange for cross-exchange strategies (e.g., maker-taker arb)
  // If specified, the worker will connect to both exchanges during registration
  ExchangeAccount account2 = 12;
  
  // Reserved field numbers from the old credential-based API.
  // These fields have been removed — credentials are now resolved server-side.
  reserved 3, 4, 5, 6, 7, 8, 9, 10;
  reserved "exchange", "api_key", "api_secret", "extra_credentials",
           "exchange2", "api_key2", "api_secret2", "extra_credentials2";
  
  // Note: market and instrument_type are now optional
  // Private channels will be connected automatically during registration
  // Market data subscription is handled separately via SubscribeMarketData
}

message SdkRegisterResponse {
  SdkResponseMetadata metadata = 1;
  bool success = 2;
  string message = 3;
  string worker_id = 4;           // Use this to reference the worker in subsequent calls
  string strategy_id = 5;         // Unique strategy identifier for this session
}

// =============================================================================
// Subscribe Market Data Messages
// =============================================================================

message SdkSubscribeRequest {
  SdkRequestMetadata metadata = 1;
  string strategy_id = 2;         // Strategy ID from registration (stable across worker restarts)
  
  // Symbols to subscribe for primary exchange
  repeated string symbols = 3;    // e.g., ["BTCUSDT", "ETHUSDT", "SOLUSDT"]
  SdkInstrumentType instrument_type = 4;
  
  // Subscription options (for market data only, private is handled in Register)
  bool subscribe_orderbook = 5;   // L2 orderbook (default true)
  bool subscribe_ticker = 6;      // Last price ticker
  int32 orderbook_depth = 7;      // Orderbook depth (e.g., 20, 50)
  
  // Optional symbols for second exchange (for cross-exchange strategies)
  // These will be subscribed on exchange2 that was registered with Register()
  repeated string symbols2 = 8;   // e.g., ["ETHUSDC"] for Lighter
  SdkInstrumentType instrument_type2 = 9;  // Type for second exchange symbols
}

message SdkSubscribeResponse {
  SdkResponseMetadata metadata = 1;
  bool success = 2;
  string message = 3;
  
  // Subscription status per symbol
  repeated SdkSymbolSubscription subscriptions = 4;
}

message SdkSymbolSubscription {
  string worker_id = 1;           // Worker ID handling this symbol
  string symbol = 2;
  bool subscribed = 3;
  string error = 4;               // Error message if failed
}

// =============================================================================
// Batch DCA Maker Order Messages
// =============================================================================

// Single DCA order configuration
message SdkDcaMakerOrder {
  string symbol = 1;
  SdkSide side = 2;
  string total_size = 3;          // Total amount to execute
  string dca_size = 4;            // Size per individual order (in symbol quantity)
  SdkMakerPriceMethod price_method = 5;
  string leverage = 6;            // Optional leverage for perp
  int32 order_timeout_ms = 7;     // Timeout before auto-cancel/replace
  bool reduce_only = 8;
  
  // DCA size in USD (alternative to dca_size). Specify how much USD per DCA step.
  // Cannot be set together with dca_size - SDK will validate and throw an error.
  // When set, the execution engine calculates:
  //   total_notional = total_size * current_price
  //   steps = ceil(total_notional / dca_usd)
  //   dca_qty = round_up(total_size / steps, step_size)
  // Final order absorbs remainder if below min_notional.
  string dca_usd = 9;
}

// Batch request - multiple DCA orders executed concurrently
message SdkBatchDcaMakerRequest {
  SdkRequestMetadata metadata = 1;
  string strategy_id = 2;         // Strategy ID from registration (stable across worker restarts)
  SdkInstrumentType instrument_type = 3;
  
  // Multiple DCA orders to execute in parallel
  repeated SdkDcaMakerOrder orders = 4;
  
  // If true, block until all executions complete and return final results
  // If false (default), return immediately with RUNNING status
  bool wait_for_completion = 5;
  
  // Optional timeout in seconds for wait_for_completion (default: 300 = 5 minutes)
  int32 timeout_seconds = 6;
  
  // If true, use taker orders to complete any unfilled amounts after expiry
  bool taker_fallback = 7;
  
  // Time limit for maker orders before falling back to taker (seconds, default: 30)
  // Only used when taker_fallback=true
  int32 expiry_seconds = 8;
  
  // REST BBO fallback for non-subscribed symbols
  bool use_rest_bbo_fallback = 9;
  
  // REST BBO polling interval in milliseconds (default: 3000 = 3 seconds)
  uint32 rest_bbo_polling_interval_ms = 10;
  
  // Global DCA steps: if > 0, the execution engine will automatically calculate
  // dca_size for each symbol based on trading rules (min_notional, min_qty, step_size).
  // This overrides individual order.dca_size values. Formula:
  //   min_qty_for_notional = max(min_notional / price, min_qty)
  //   effective_steps = min(max_possible_steps, dca_steps), capped at 1 minimum
  //   dca_size = ceil(total_size / effective_steps, step_size)
  // If dca_steps = 0 (default), each order's dca_size is used as specified.
  uint32 dca_steps = 11;
}

// Result for a single symbol execution
// Used by SdkBatchDcaMakerResponse
message SdkSymbolExecutionResult {
  string symbol = 1;
  bool success = 2;
  string message = 3;
  SdkActionStatus status = 4;
  
  // Order info
  string action_id = 5;
  SdkSide side = 6;               // Direction (BUY or SELL)
  
  // Target calculation
  string target_weight = 7;       // Requested weight
  string target_notional = 8;     // Target notional value
  string target_qty = 9;          // Target quantity
  string current_qty = 10;        // Position quantity before execution
  string delta_qty = 11;          // Required change (total_size for batch)
  
  // Execution results (populated when wait_for_completion=true)
  string filled_qty = 12;         // Total quantity filled
  string avg_price = 13;          // Volume-weighted average fill price
  int32 maker_order_count = 14;   // Number of maker orders placed
  int32 taker_order_count = 15;   // Number of taker orders placed (fallback)
  string total_volume = 16;       // Total notional volume traded
  string final_qty = 17;          // Final position quantity after execution
  string unfilled_qty = 18;       // Quantity not filled (if any)
  
  // Post-trade analysis fields
  string reference_price = 19;    // Price snapshot at start of execution for slippage calculation (best_ask for BUY, best_bid for SELL)
  string slippage_bps = 20;       // Slippage in basis points: (avg_price - reference_price) / reference_price * 10000
  string trading_fee_usd = 21;    // Total trading fees paid in USD for this symbol
  string maker_fee_usd = 22;      // Trading fees from maker orders (USD)
  string taker_fee_usd = 23;      // Trading fees from taker orders (USD)
  
  // Timing fields
  int64 reference_time_ns = 24;   // Timestamp (ns) when first order was placed for this symbol
  int64 filled_time_ns = 25;      // Timestamp (ns) when execution completed (all orders filled or taker fallback done)
  
  // Detailed price snapshot at execution start (for advanced analysis)
  string mid_price = 26;          // Mid price at execution start: (best_bid + best_ask) / 2
  string best_bid = 27;           // Best bid price at execution start
  string best_ask = 28;           // Best ask price at execution start
}

// Legacy result type for backward compatibility
message SdkDcaMakerResult {
  string symbol = 1;
  string action_id = 2;
  bool success = 3;
  string message = 4;
  SdkActionStatus status = 5;
  
  // Execution statistics (populated when wait_for_completion=true)
  string filled_amount = 6;       // Total amount actually filled
  string avg_price = 7;           // Volume-weighted average price
  int32 order_count = 8;          // Number of orders placed
  string total_volume = 9;        // Total notional volume (filled_amount * avg_price)
  string remaining_amount = 10;   // Amount that was not filled (if any)
  
  // Post-trade analysis fields
  string trading_fee_usd = 11;    // Total trading fees paid in USD
}

// Response for batch DCA execution
message SdkBatchDcaMakerResponse {
  SdkResponseMetadata metadata = 1;
  bool success = 2;               // True if all orders completed/started successfully
  string message = 3;
  
  // Results for each symbol with detailed statistics (unified format)
  repeated SdkSymbolExecutionResult results = 4;
  
  // Summary statistics (field names match what Python SDK expects)
  int32 total_orders = 5;
  int32 successful_orders = 6;
  int32 failed_orders = 7;
  string total_volume_traded = 8; // Sum of all symbol volumes
  
  // Post-trade analysis summary
  string total_trading_fee_usd = 9;   // Total trading fees across all symbols (USD)
  double avg_slippage_bps = 10;       // Volume-weighted average slippage in basis points
  
  // Execution timing
  int64 execution_start_timestamp = 11;  // Unix timestamp (ms) when execution started
  int64 execution_end_timestamp = 12;    // Unix timestamp (ms) when execution ended
  
  // Legacy results for backward compatibility with older SDK clients
  repeated SdkDcaMakerResult legacy_results = 13;
}

// =============================================================================
// Health Check Messages
// =============================================================================

message SdkHealthCheckRequest {
  SdkRequestMetadata metadata = 1;
  string strategy_id = 2;         // Optional - if empty, checks service health
}

message SdkHealthCheckResponse {
  SdkResponseMetadata metadata = 1;
  bool healthy = 2;
  string status = 3;
  
  // Worker-specific info (if worker_id was provided)
  int32 active_workers = 4;
  int64 uptime_seconds = 5;
}

// =============================================================================
// Shutdown Messages
// =============================================================================

message SdkShutdownRequest {
  SdkRequestMetadata metadata = 1;
  string strategy_id = 2;         // Strategy to shutdown
}

message SdkShutdownResponse {
  SdkResponseMetadata metadata = 1;
  bool success = 2;
  string message = 3;
}

// =============================================================================
// DCA Taker Order Messages
// =============================================================================
// Single exchange taker order with DCA execution
// Particularly useful for Hyperliquid HIP-3 tokens (e.g., xyz:GOOGL, xyz:TSLA)

message SdkDcaTakerOrder {
  string symbol = 1;              // e.g., "BTC", "xyz:GOOGL" for HIP-3
  SdkSide side = 2;
  string total_size = 3;          // Total amount to execute
  string dca_size = 4;            // Size per individual order
  // Field 5 removed (was leverage)
  bool reduce_only = 6;
  bool best_effort_completion = 7; // Continue even if dca_size > remaining
}

message SdkDcaTakerRequest {
  SdkRequestMetadata metadata = 1;
  string strategy_id = 2;         // Strategy ID from registration (stable across worker restarts)
  SdkInstrumentType instrument_type = 3;
  
  // Single DCA taker order
  SdkDcaTakerOrder order = 4;
  
  // If true, block until execution completes and return final result
  // If false (default), return immediately with RUNNING status
  bool wait_for_completion = 5;
  
  // Optional timeout in seconds for wait_for_completion (default: 300 = 5 minutes)
  int32 timeout_seconds = 6;
}

message SdkDcaTakerResponse {
  SdkResponseMetadata metadata = 1;
  bool success = 2;
  string message = 3;
  
  // Result
  SdkDcaTakerResult result = 4;
}

message SdkDcaTakerResult {
  string symbol = 1;
  string action_id = 2;
  bool success = 3;
  string message = 4;
  SdkActionStatus status = 5;
  
  // Execution statistics (populated when wait_for_completion=true)
  string filled_amount = 6;       // Total amount actually filled
  string avg_price = 7;           // Volume-weighted average price
  int32 order_count = 8;          // Number of orders placed
  string total_volume = 9;        // Total notional volume (filled_amount * avg_price)
}

// =============================================================================
// Snapshot Query Messages - Query current state from worker
// =============================================================================

// Get positions request
message SdkGetPositionsRequest {
  SdkRequestMetadata metadata = 1;
  string strategy_id = 2;         // Strategy ID from registration
  string symbol = 3;              // Optional: filter by symbol (empty = all)
  SdkInstrumentType instrument_type = 4;
}

message SdkPositionInfo {
  string symbol = 1;
  string side = 2;                // "LONG" or "SHORT"
  string size = 3;
  string entry_price = 4;
  string mark_price = 5;
  string unrealized_pnl = 6;
  string leverage = 7;
  string margin_type = 8;
  string liquidation_price = 9;
}

message SdkGetPositionsResponse {
  SdkResponseMetadata metadata = 1;
  bool success = 2;
  string message = 3;
  repeated SdkPositionInfo positions = 4;
}

// Get portfolio request
message SdkGetPortfolioRequest {
  SdkRequestMetadata metadata = 1;
  string strategy_id = 2;         // Strategy ID from registration
}

message SdkAssetBalance {
  string asset = 1;               // e.g., "USDT", "BTC"
  string free = 2;                // Available balance
  string locked = 3;              // Locked in orders
  string total = 4;
  string usd_value = 5;           // USD equivalent value
}

message SdkGetPortfolioResponse {
  SdkResponseMetadata metadata = 1;
  bool success = 2;
  string message = 3;
  repeated SdkAssetBalance balances = 4;
  string total_usd_value = 5;
}

// Get prices request
message SdkGetPricesRequest {
  SdkRequestMetadata metadata = 1;
  string strategy_id = 2;         // Strategy ID from registration
  repeated string symbols = 3;    // Symbols to get prices for
  SdkInstrumentType instrument_type = 4;
}

message SdkSymbolPrice {
  string symbol = 1;
  string price = 2;
  int64 timestamp = 3;            // Unix timestamp in milliseconds
}

message SdkGetPricesResponse {
  SdkResponseMetadata metadata = 1;
  bool success = 2;
  string message = 3;
  repeated SdkSymbolPrice prices = 4;
}

// =============================================================================
// Maker-Taker Cross-Exchange Arbitrage Messages
// =============================================================================
// Cross-exchange spread arbitrage execution: Places maker orders on one exchange
// and immediately hedges with taker orders on another when spread is favorable.
// Used for funding rate arbitrage with optional spread capture.
//
// Example: Short SOL on Hyperliquid (maker) + Long SOL on Backpack (taker)
//   - Monitor spread between HL best_ask and BP best_ask
//   - When spread >= threshold (e.g., 8 bps), place maker order on HL
//   - On fill, immediately execute taker order on BP
//   - Result: Delta-neutral position earning funding rate + captured spread

// Request to execute maker-taker cross-exchange arbitrage
message SdkMakerTakerRequest {
  SdkRequestMetadata metadata = 1;
  string strategy_id = 2;                 // Strategy ID from registration

  // Maker leg configuration
  SdkExchange maker_exchange = 3;         // Exchange for maker orders (e.g., HYPERLIQUID)
  string maker_symbol = 4;                // Symbol on maker exchange (e.g., "SOL")
  SdkInstrumentType maker_instrument_type = 5;
  SdkSide maker_side = 6;                 // Side for maker orders (BUY or SELL)
  SdkMakerPriceMethod maker_price_method = 7;  // Price method for maker orders
  string maker_leverage = 8;              // Leverage for maker exchange (optional)
  bool maker_reduce_only = 9;             // If true, only reduce existing position

  // Taker leg configuration
  SdkExchange taker_exchange = 10;        // Exchange for taker orders (e.g., BACKPACK)
  string taker_symbol = 11;               // Symbol on taker exchange (e.g., "SOL_USDC_PERP")
  SdkInstrumentType taker_instrument_type = 12;
  SdkSide taker_side = 13;                // Side for taker orders (opposite of maker_side)
  string taker_leverage = 14;             // Leverage for taker exchange (optional)
  bool taker_reduce_only = 15;            // If true, only reduce existing position

  // Execution parameters
  string total_size = 16;                 // Total amount to execute (e.g., "1.0" for 1 SOL)
  string dca_size = 17;                   // Amount per DCA round (e.g., "0.2" for 0.2 SOL)
  string spread_threshold_bps = 18;       // Minimum spread in bps to place/maintain orders (e.g., "8" for 8 bps)
  int32 expiry_seconds = 19;              // Time limit for execution (default: 300)
  int32 order_timeout_ms = 20;            // Timeout before replacing maker order (default: 30000)

  // Control flags
  bool wait_for_completion = 21;          // If true, block until execution completes
  int32 timeout_seconds = 22;             // Timeout for wait_for_completion (default: expiry_seconds + 60)
  bool best_effort_completion = 23;       // Continue even if dca_size > remaining
}

// Result for maker-taker execution
message SdkMakerTakerResult {
  bool success = 1;
  string message = 2;
  SdkActionStatus status = 3;

  // Maker leg results
  string maker_filled_qty = 4;            // Total quantity filled on maker exchange
  string maker_avg_price = 5;             // Volume-weighted average price on maker
  int32 maker_order_count = 6;            // Number of maker orders placed

  // Taker leg results
  string taker_filled_qty = 7;            // Total quantity filled on taker exchange
  string taker_avg_price = 8;             // Volume-weighted average price on taker
  int32 taker_order_count = 9;            // Number of taker orders placed

  // Summary
  string total_maker_volume = 10;         // Total notional on maker side
  string total_taker_volume = 11;         // Total notional on taker side
  string realized_spread_bps = 12;        // Actual spread captured (bps)
  string unfilled_amount = 13;            // Amount not executed (if any)
}

// Response for maker-taker execution
message SdkMakerTakerResponse {
  SdkResponseMetadata metadata = 1;
  bool success = 2;
  string message = 3;

  // Execution result
  SdkMakerTakerResult result = 4;
}

// =============================================================================
// Taker-Taker Cross-Exchange Arbitrage Messages
// =============================================================================
// Cross-exchange spread arbitrage execution: Places market orders on both exchanges
// simultaneously when spread is favorable. Simpler and faster than maker-taker,
// but pays taker fees on both sides.
//
// Example: Long ETH on Hyperliquid + Short ETH on Drift
//   - Monitor spread between HL best_ask and Drift best_bid
//   - When spread >= threshold (e.g., 10 bps), place market orders on both
//   - Result: Delta-neutral position capturing the spread

// Request to execute taker-taker cross-exchange arbitrage
// Uses same result type as MakerTaker since the output structure is identical
message SdkTakerTakerRequest {
  SdkRequestMetadata metadata = 1;
  string strategy_id = 2;                 // Strategy ID from registration

  // Taker1 leg configuration (typically the primary exchange)
  SdkExchange taker1_exchange = 3;        // Exchange for taker1 orders (e.g., HYPERLIQUID)
  string taker1_symbol = 4;               // Symbol on taker1 exchange (e.g., "ETH")
  SdkInstrumentType taker1_instrument_type = 5;
  SdkSide taker1_side = 6;                // Side for taker1 orders (BUY or SELL)
  string taker1_leverage = 7;             // Leverage for taker1 exchange (optional)
  bool taker1_reduce_only = 8;            // If true, only reduce existing position

  // Taker2 leg configuration (typically the secondary exchange)
  SdkExchange taker2_exchange = 9;        // Exchange for taker2 orders (e.g., DRIFT)
  string taker2_symbol = 10;              // Symbol on taker2 exchange (e.g., "ETH-PERP")
  SdkInstrumentType taker2_instrument_type = 11;
  SdkSide taker2_side = 12;               // Side for taker2 orders (opposite of taker1_side)
  string taker2_leverage = 13;            // Leverage for taker2 exchange (optional)
  bool taker2_reduce_only = 14;           // If true, only reduce existing position

  // Execution parameters
  string total_size = 15;                 // Total amount to execute (e.g., "1.0" for 1 ETH)
  string dca_size = 16;                   // Amount per DCA round (e.g., "0.2" for 0.2 ETH)
  string spread_threshold_bps = 17;       // Minimum spread in bps to place orders (e.g., "10" for 10 bps)
  int32 expiry_seconds = 18;              // Time limit for execution (default: 300)
  int32 order_timeout_ms = 19;            // Order timeout in ms (default: 5000)

  // Control flags
  bool wait_for_completion = 20;          // If true, block until execution completes
  int32 timeout_seconds = 21;             // Timeout for wait_for_completion (default: expiry_seconds + 60)
  bool best_effort_completion = 22;       // Continue even if dca_size > remaining
  int32 confirmation_ticks = 23;          // Number of price ticks to confirm spread before executing (default: 3)
}

// Response for taker-taker execution (reuses MakerTakerResult for consistency)
message SdkTakerTakerResponse {
  SdkResponseMetadata metadata = 1;
  bool success = 2;
  string message = 3;

  // Execution result - uses same structure as MakerTaker
  // maker_* fields represent taker1, taker_* fields represent taker2
  SdkMakerTakerResult result = 4;
}

// =============================================================================
// Update Isolated Margin
// =============================================================================

// Request to transfer margin into a symbol's isolated margin position
message SdkUpdateIsolatedMarginRequest {
  SdkRequestMetadata metadata = 1;
  string strategy_id = 2;
  string symbol = 3;
  string amount = 4;               // USDC amount to transfer (capped at available balance)
}

